<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roman Urdu Sentiment Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0d0d12;
      --surface:   #15151e;
      --border:    #2a2a3a;
      --accent:    #e8c97e;
      --accent2:   #7e9ee8;
      --pos:       #5ecb8f;
      --neg:       #e8706a;
      --neu:       #a0a8c0;
      --text:      #eeeef4;
      --muted:     #7a7a9a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* ── Background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,201,126,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,201,126,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* ── Glow blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      opacity: 0.18;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; right: -100px; }
    .blob-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -120px; left: -80px; }

    /* ── Card ── */
    .card {
      position: relative;
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 3rem 3rem 2.5rem;
      box-shadow: 0 32px 80px rgba(0,0,0,.5);
      z-index: 1;
    }

    /* ── Header ── */
    .badge {
      display: inline-block;
      font-size: .7rem;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(232,201,126,.3);
      border-radius: 999px;
      padding: .3rem .9rem;
      margin-bottom: 1.2rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.9rem, 5vw, 2.8rem);
      font-weight: 900;
      line-height: 1.15;
      margin-bottom: .6rem;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      font-size: .95rem;
      margin-bottom: 2.2rem;
      font-weight: 300;
    }

    /* ── Textarea ── */
    .input-wrap { position: relative; }

    textarea {
      width: 100%;
      background: #0d0d12;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      padding: 1.1rem 1.3rem;
      resize: vertical;
      min-height: 130px;
      transition: border-color .25s;
      outline: none;
    }
    textarea::placeholder { color: var(--muted); }
    textarea:focus { border-color: var(--accent); }

    .char-count {
      position: absolute;
      bottom: .7rem;
      right: 1rem;
      font-size: .75rem;
      color: var(--muted);
    }

    /* ── Examples ── */
    .examples {
      margin-top: .9rem;
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
    }
    .examples p { width: 100%; font-size: .78rem; color: var(--muted); margin-bottom: .2rem; }

    .chip {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: .78rem;
      padding: .3rem .85rem;
      cursor: pointer;
      transition: all .2s;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Button ── */
    .btn {
      margin-top: 1.6rem;
      width: 100%;
      background: var(--accent);
      color: #0d0d12;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      padding: .95rem;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      letter-spacing: .02em;
    }
    .btn:hover { opacity: .88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* ── Spinner ── */
    .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2px solid rgba(13,13,18,.3);
      border-top-color: #0d0d12;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result box ── */
    .result {
      margin-top: 1.8rem;
      border-radius: 16px;
      padding: 1.5rem 1.6rem;
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,.02);
      display: none;
      animation: fadeUp .4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result.positive { border-color: rgba(94,203,143,.35); background: rgba(94,203,143,.05); }
    .result.negative { border-color: rgba(232,112,106,.35); background: rgba(232,112,106,.05); }
    .result.neutral  { border-color: rgba(160,168,192,.25); background: rgba(160,168,192,.04); }

    .result-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .8rem;
      margin-bottom: 1.1rem;
    }

    .sentiment-label {
      display: flex;
      align-items: center;
      gap: .7rem;
    }

    .emoji { font-size: 2rem; }

    .label-text h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      text-transform: capitalize;
    }

    .result.positive .label-text h2 { color: var(--pos); }
    .result.negative .label-text h2 { color: var(--neg); }
    .result.neutral  .label-text h2 { color: var(--neu); }

    .label-text p { color: var(--muted); font-size: .82rem; margin-top: .1rem; }

    /* ── Confidence bar ── */
    .confidence-wrap { width: 140px; }
    .confidence-wrap p { font-size: .75rem; color: var(--muted); margin-bottom: .35rem; text-align: right; }
    .bar-bg {
      height: 7px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 999px;
      width: 0%;
      transition: width 1s cubic-bezier(.4,0,.2,1);
    }
    .result.positive .bar-fill { background: var(--pos); }
    .result.negative .bar-fill { background: var(--neg); }
    .result.neutral  .bar-fill { background: var(--neu); }

    /* ── Cleaned text ── */
    .cleaned-section { margin-top: 1rem; }
    .cleaned-section p:first-child {
      font-size: .75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: .4rem;
    }
    .cleaned-text {
      font-size: .9rem;
      color: var(--text);
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .6rem .9rem;
      font-style: italic;
      word-break: break-word;
    }

    /* ── Error ── */
    .error-msg {
      margin-top: 1rem;
      color: var(--neg);
      font-size: .88rem;
      display: none;
    }

    /* ── Footer ── */
    footer {
      margin-top: 1.8rem;
      font-size: .78rem;
      color: var(--muted);
      text-align: center;
      z-index: 1;
    }

    @media (max-width: 520px) {
      .card { padding: 2rem 1.4rem; }
      .confidence-wrap { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <div class="badge">NLP · Machine Learning Project</div>
    <h1>Roman Urdu<br><span>Sentiment Analyzer</span></h1>
    <p class="subtitle">Type Roman Urdu text and the model will predict whether it's positive, negative, or neutral.</p>

    <div class="input-wrap">
      <textarea id="inputText" maxlength="500"
        placeholder="e.g. Yeh film bohat achi thi, mujhe pasand aayi..."></textarea>
      <span class="char-count"><span id="charCount">0</span>/500</span>
    </div>

    <div class="examples">
      <p>Try an example →</p>
      <button class="chip" onclick="setExample('Yeh movie bohat zabardast thi, best film hai')">😊 Positive</button>
      <button class="chip" onclick="setExample('Yeh kaam bilkul bekar aur bakwas tha')">😠 Negative</button>
      <button class="chip" onclick="setExample('Film theek thi, kuch scenes ache the kuch nahi')">😐 Neutral</button>
    </div>

    <button class="btn" id="analyzeBtn" onclick="analyze()">
      <span id="btnText">Analyze Sentiment</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <p class="error-msg" id="errorMsg"></p>

    <!-- Result -->
    <div class="result" id="resultBox">
      <div class="result-top">
        <div class="sentiment-label">
          <span class="emoji" id="emoji"></span>
          <div class="label-text">
            <h2 id="sentimentLabel"></h2>
            <p id="sentimentDesc"></p>
          </div>
        </div>
        <div class="confidence-wrap">
          <p id="confidenceText"></p>
          <div class="bar-bg">
            <div class="bar-fill" id="barFill"></div>
          </div>
        </div>
      </div>
      <div class="cleaned-section">
        <p>After preprocessing</p>
        <div class="cleaned-text" id="cleanedText"></div>
      </div>
    </div>
  </div>

  <footer>Roman Urdu Sentiment Analysis &nbsp;·&nbsp; Semester Project &nbsp;·&nbsp; Built with Flask &amp; Scikit-learn</footer>

  <script>
    const textarea = document.getElementById('inputText');
    const charCount = document.getElementById('charCount');

    textarea.addEventListener('input', () => {
      charCount.textContent = textarea.value.length;
    });

    function setExample(text) {
      textarea.value = text;
      charCount.textContent = text.length;
    }

    const descriptions = {
      positive: 'The text expresses a positive opinion 😊',
      negative: 'The text expresses a negative opinion 😠',
      neutral:  'The text appears neutral or mixed 😐'
    };
    const emojis = { positive: '✅', negative: '❌', neutral: '➖' };

    async function analyze() {
      const text = textarea.value.trim();
      const btn  = document.getElementById('analyzeBtn');
      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('spinner');
      const errorMsg = document.getElementById('errorMsg');
      const resultBox = document.getElementById('resultBox');

      if (!text) {
        errorMsg.textContent = 'Please enter some Roman Urdu text first.';
        errorMsg.style.display = 'block';
        return;
      }

      errorMsg.style.display = 'none';
      resultBox.style.display = 'none';
      btn.disabled = true;
      btnText.style.display = 'none';
      spinner.style.display = 'block';

      try {
        const res = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        const data = await res.json();

        if (data.error) {
          errorMsg.textContent = data.error;
          errorMsg.style.display = 'block';
        } else {
          const s = data.sentiment;
          resultBox.className = `result ${s}`;
          document.getElementById('emoji').textContent = emojis[s];
          document.getElementById('sentimentLabel').textContent = s;
          document.getElementById('sentimentDesc').textContent = descriptions[s];
          document.getElementById('confidenceText').textContent = `Confidence: ${data.confidence}%`;
          document.getElementById('cleanedText').textContent = data.cleaned_text || '(empty after preprocessing)';

          resultBox.style.display = 'block';
          setTimeout(() => {
            document.getElementById('barFill').style.width = data.confidence + '%';
          }, 80);
        }
      } catch (err) {
        errorMsg.textContent = 'Something went wrong. Is Flask running?';
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
      }
    }

    // Allow Enter + Ctrl/Cmd to submit
    textarea.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') analyze();
    });
  </script>
</body>
</html>
